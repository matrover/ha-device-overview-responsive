<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Device Overview Responsive preview</title>
  <desc id="desc">An anonymized Home Assistant device overview with wider responsive columns.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#101010"/>
  <rect y="0" width="1280" height="52" fill="#1b1b1b"/>
  <text x="68" y="34" fill="#e6e6e6" font-family="Arial, sans-serif" font-size="18" font-weight="600">Example Climate Device</text>
  <path d="M30 26h18M30 18h18M30 34h18" stroke="#bdbdbd" stroke-width="2" stroke-linecap="round"/>
  <text x="545" y="96" fill="#03a9f4" font-family="Arial, sans-serif" font-size="14">In Example Room</text>
  <g transform="translate(938 82)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="#03a9f4"/>
    <text x="38" y="20" fill="#e6e6e6" font-family="Arial, sans-serif" font-size="26" font-weight="700">ESPHome</text>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(98 126)">
      <rect width="330" height="252" rx="8" fill="#1c1c1c" stroke="#3a3a3a"/>
      <text x="22" y="42" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="600">Device info</text>
      <text x="22" y="82" fill="#cfcfcf" font-family="Arial, sans-serif" font-size="14">demo_board</text>
      <text x="22" y="106" fill="#cfcfcf" font-family="Arial, sans-serif" font-size="14">by Example Vendor</text>
      <text x="22" y="146" fill="#fff" font-family="Arial, sans-serif" font-size="14">Firmware: 2026.5.0</text>
      <text x="22" y="182" fill="#fff" font-family="Arial, sans-serif" font-size="14">MAC: 00:00:00:00:00:00</text>
      <rect x="0" y="202" width="330" height="1" fill="#333"/>
      <text x="56" y="232" fill="#fff" font-family="Arial, sans-serif" font-size="14">ESPHome</text>
      <circle cx="29" cy="227" r="13" fill="#03a9f4"/>
    </g>

    <g transform="translate(456 126)">
      <rect width="330" height="252" rx="8" fill="#1c1c1c" stroke="#3a3a3a"/>
      <text x="22" y="42" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="600">Controls</text>
      <text x="68" y="84" fill="#fff" font-family="Arial, sans-serif" font-size="15">Auto mode</text>
      <rect x="268" y="66" width="42" height="22" rx="11" fill="#555"/>
      <circle cx="281" cy="77" r="9" fill="#aaa"/>
      <rect x="68" y="108" width="238" height="54" rx="4" fill="#3a3a3a"/>
      <text x="86" y="130" fill="#bdbdbd" font-family="Arial, sans-serif" font-size="12">Fan</text>
      <text x="86" y="149" fill="#fff" font-family="Arial, sans-serif" font-size="15">Auto</text>
      <rect x="68" y="172" width="238" height="54" rx="4" fill="#3a3a3a"/>
      <text x="86" y="194" fill="#bdbdbd" font-family="Arial, sans-serif" font-size="12">Vanes</text>
      <text x="86" y="213" fill="#fff" font-family="Arial, sans-serif" font-size="15">Swing</text>
    </g>

    <g transform="translate(814 126)">
      <rect width="330" height="252" rx="8" fill="#1c1c1c" stroke="#3a3a3a"/>
      <text x="22" y="42" fill="#cfcfcf" font-family="Arial, sans-serif" font-size="25" font-weight="600">Activity</text>
      <text x="22" y="82" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="700">May 20, 2026</text>
      <text x="22" y="120" fill="#2f83c6" font-family="Arial, sans-serif" font-size="14">Example Climate</text>
      <text x="142" y="120" fill="#fff" font-family="Arial, sans-serif" font-size="14">changed to Auto</text>
      <rect x="22" y="144" width="286" height="1" fill="#333"/>
      <text x="22" y="176" fill="#2f83c6" font-family="Arial, sans-serif" font-size="14">Example Fan</text>
      <text x="112" y="176" fill="#fff" font-family="Arial, sans-serif" font-size="14">changed to Quiet</text>
      <rect x="22" y="200" width="286" height="1" fill="#333"/>
    </g>

    <g transform="translate(98 404)">
      <rect width="330" height="154" rx="8" fill="#1c1c1c" stroke="#3a3a3a"/>
      <text x="22" y="42" fill="#cfcfcf" font-family="Arial, sans-serif" font-size="25" font-weight="600">Automations</text>
      <text x="22" y="94" fill="#fff" font-family="Arial, sans-serif" font-size="14">Example automation</text>
    </g>

    <g transform="translate(456 404)">
      <rect width="330" height="230" rx="8" fill="#1c1c1c" stroke="#3a3a3a"/>
      <text x="22" y="42" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="600">Sensors</text>
      <text x="68" y="92" fill="#fff" font-family="Arial, sans-serif" font-size="14">Room temperature</text>
      <text x="248" y="92" fill="#fff" font-family="Arial, sans-serif" font-size="14" text-anchor="end">21.4 °C</text>
      <text x="68" y="134" fill="#fff" font-family="Arial, sans-serif" font-size="14">Humidity</text>
      <text x="248" y="134" fill="#fff" font-family="Arial, sans-serif" font-size="14" text-anchor="end">48 %</text>
      <text x="68" y="176" fill="#fff" font-family="Arial, sans-serif" font-size="14">Runtime</text>
      <text x="248" y="176" fill="#fff" font-family="Arial, sans-serif" font-size="14" text-anchor="end">120 h</text>
    </g>
  </g>
</svg>
